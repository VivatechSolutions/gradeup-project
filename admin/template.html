<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Book UI Template</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Marked.js for parsing Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Custom styles for markdown content inside the book */
        .markdown-content p { margin-bottom: 1rem; line-height: 1.7; color: #374151; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: 700; color: #111827; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-content h1 { font-size: 1.5rem; }
        .markdown-content h2 { font-size: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.25rem; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content img { max-width: 100%; border-radius: 0.5rem; margin: 1rem auto; display: block; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .markdown-content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .markdown-content th, .markdown-content td { border: 1px solid #d1d5db; padding: 0.5rem; text-align: left; }
        .markdown-content th { background-color: #f3f4f6; }
        .markdown-content code { background-color: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.875em; }
        .markdown-content pre { background-color: #1f2937; color: #f9fafb; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .markdown-content pre code { background-color: transparent; color: inherit; padding: 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // ----------------------------------------------------
        // 1. COMPONENTS FOR DIFFERENT SECTION TYPES
        // ----------------------------------------------------

        // Reusable Markdown Renderer Component
        const MarkdownText = ({ content }) => {
            // Parse markdown string to HTML
            const html = marked.parse(content || "");
            return <div className="markdown-content" dangerouslySetInnerHTML={{ __html: html }} />;
        };

        // Renders standard theory/text sections
        const SectionRenderer = ({ data }) => (
            <div className="mb-10 bg-white rounded-xl p-8 shadow-sm border border-gray-100 transition duration-300 hover:shadow-md">
                {data.title && <h3 className="text-xl font-bold text-blue-800 mb-4">{data.title}</h3>}
                <MarkdownText content={data.content} />
            </div>
        );

        // Renders examples/problems
        const ExampleRenderer = ({ data }) => (
            <div className="mb-10 bg-indigo-50 rounded-xl p-8 border-l-4 border-indigo-500 shadow-sm relative overflow-hidden">
                <div className="absolute top-0 right-0 bg-indigo-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">EXAMPLE</div>
                {data.title && <h3 className="text-lg font-bold text-indigo-900 mb-3">{data.title}</h3>}
                <div className="text-indigo-800">
                    <MarkdownText content={data.content} />
                </div>
                
                {data.metadata?.solution && (
                    <div className="mt-6 pt-4 border-t border-indigo-200">
                        <h4 className="text-sm font-bold text-indigo-600 mb-2 uppercase tracking-wider">Solution:</h4>
                        <div className="text-gray-800 bg-white p-4 rounded-lg shadow-inner">
                            <MarkdownText content={data.metadata.solution} />
                        </div>
                    </div>
                )}
            </div>
        );

        // Renders activities/experiments
        const ActivityRenderer = ({ data }) => (
            <div className="mb-10 bg-emerald-50 rounded-xl p-8 border-l-4 border-emerald-500 shadow-sm relative overflow-hidden">
                <div className="absolute top-0 right-0 bg-emerald-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">ACTIVITY</div>
                {data.title && <h3 className="text-lg font-bold text-emerald-900 mb-3">{data.title}</h3>}
                <div className="text-emerald-800">
                    <MarkdownText content={data.content} />
                </div>
            </div>
        );

        // Renders evaluations/exercises
        const ExerciseRenderer = ({ data }) => (
            <div className="mb-10 bg-orange-50 rounded-xl p-8 border border-orange-200 shadow-sm">
                <h3 className="text-2xl font-bold text-orange-800 mb-6 flex items-center">
                    <svg className="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    {data.title || "Evaluation / Exercises"}
                </h3>
                <div className="text-gray-800">
                    <MarkdownText content={data.content} />
                </div>
            </div>
        );

        // ----------------------------------------------------
        // 2. MAIN BOOK VIEWER COMPONENT
        // ----------------------------------------------------
        const BookViewer = ({ unit }) => {
            if (!unit) return <div className="p-10 text-center text-gray-500">Loading book data...</div>;

            return (
                <div className="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
                    
                    {/* Header Section */}
                    <header className="mb-12 bg-white rounded-2xl p-8 shadow-sm border border-gray-100 text-center">
                        <span className="text-sm font-bold text-blue-600 tracking-wider uppercase mb-2 block">
                            {unit.subject} • Unit {unit.unit_number}
                        </span>
                        <h1 className="text-4xl font-extrabold text-gray-900 mb-6">{unit.title}</h1>
                        
                        <div className="text-lg text-gray-600 text-left bg-gray-50 p-6 rounded-xl italic">
                            {unit.introduction}
                        </div>

                        {unit.learning_objectives && unit.learning_objectives.length > 0 && (
                            <div className="mt-8 text-left bg-blue-50 p-6 rounded-xl border border-blue-100">
                                <h3 className="text-lg font-bold text-blue-800 mb-4 flex items-center">
                                    <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    Learning Objectives
                                </h3>
                                <ul className="list-disc pl-5 space-y-2 text-blue-900">
                                    {unit.learning_objectives.map((obj, i) => (
                                        <li key={i}>{obj}</li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </header>

                    {/* Content Sections Engine */}
                    <main>
                        {unit.sections.map((section, index) => {
                            // Render correct component based on section.type
                            switch (section.type) {
                                case "section":
                                    return <SectionRenderer key={index} data={section} />;
                                case "example":
                                case "problem":
                                    return <ExampleRenderer key={index} data={section} />;
                                case "activity":
                                    return <ActivityRenderer key={index} data={section} />;
                                case "unit_exercise":
                                    return <ExerciseRenderer key={index} data={section} />;
                                default:
                                    // Fallback for unknown types
                                    return <SectionRenderer key={index} data={section} />;
                            }
                        })}
                    </main>
                    
                    <footer className="mt-16 text-center text-gray-400 text-sm pb-8 border-t pt-8">
                        End of Unit {unit.unit_number}
                    </footer>
                </div>
            );
        };

        // ----------------------------------------------------
        // 3. APP INITIALIZATION WITH SAMPLE DATA
        // ----------------------------------------------------
        const App = () => {
            // We use a small subset of your actual structured.json as sample data
            const sampleUnitData = {
                "unit_number": 1,
                "title": "Measurement",
                "subject": "Science",
                "introduction": "In day to day life, we measure many things such as weight of fruits, vegetables and food grains, volume of liquids, temperature of the body, speed of the vehicles etc. In this lesson, we are going to study about fundamental quantities, derived quantities such as area, volume and density, and measurement of larger quantities.",
                "learning_objectives": [
                    "Identify fundamental and derived physical quantities.",
                    "Measure the area and volume of some regular shaped and irregular shaped objects.",
                    "Calculate the density of solids and liquids."
                ],
                "sections": [
                    {
                        "type": "section",
                        "title": "1.2 Area",
                        "content": "Area is a measure of how much space is there on a flat surface. The area of a plot of land is derived by multiplying its length and breadth.\n\n**Area = length × breadth**\n\nThe unit of the area is m² (Read as square metre). Area is a derived quantity as we obtain it by multiplying the fundamental physical quantity length.\n\n### 1.2.1 Area of regularly shaped objects\n\n| Plane figure | Formula |\n| --- | --- |\n| Square | side × side |\n| Rectangle | length × breadth |\n| Circle | π × r² |"
                    },
                    {
                        "type": "example",
                        "title": "Problem 1.1",
                        "content": "What is the area of 10 squares each having side of 1 m?",
                        "metadata": {
                            "solution": "Area of a square = side × side\n= 1 m × 1 m\n= 1 m²\n\nArea of 10 squares = 1 m² × 10 = **10 square metres**"
                        }
                    },
                    {
                        "type": "activity",
                        "title": "ACTIVITY 1",
                        "content": "Take a leaf from any one of the trees. Place it on a graph sheet and draw the outline of the leaf with a pencil. Remove the leaf. You can see the outline of the leaf on the graph sheet.\n\ni. Count the number of whole squares enclosed.\nii. Count the number of squares that are more than half.\n\nThis method can be used to calculate the area of any irregularly shaped plane figures."
                    },
                    {
                        "type": "section",
                        "title": "1.4 Density",
                        "content": "Take water in a beaker and drop an iron ball and a cork into the water. The iron ball sinks and the cork floats. Why?\n\nDensity of a substance is defined as the mass of the substance contained in unit volume. \n\n**Density (D) = Mass (M) / Volume (V)**\n\n![Density Illustration](https://gradeup-books-images.s3.us-east-1.amazonaws.com/structured-content/state_board/07/science/unit-1/img-14.jpeg)"
                    },
                    {
                        "type": "unit_exercise",
                        "title": "Evaluation",
                        "content": "### I. Choose the best answer.\n\n1. Which of the following is a derived quantity?\n   a) mass\n   b) time\n   c) area\n   d) length\n\n2. SI unit of density is\n   a) kg/m²\n   b) kg/m³\n   c) kg/m\n   d) g/m³"
                    }
                ]
            };

            return <BookViewer unit={sampleUnitData} />;
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
